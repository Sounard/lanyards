<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lanyards &amp; Dragons</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #020a02;
        height: 100%;
        overflow: hidden;
        font-family: "Courier New", monospace;
      }
      #game {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* The terminal cursor that greets you before WebGL boots. */
      #preboot {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #39ff14;
        font-family: "Courier New", monospace;
        font-size: 14px;
        letter-spacing: 1px;
        z-index: 5;
        pointer-events: none;
        text-shadow: 0 0 6px #39ff14;
      }
      .blink { animation: blink 1s steps(1) infinite; }
      @keyframes blink { 50% { opacity: 0; } }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="preboot">booting<span class="blink">_</span></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
