name: Deploy to GitHub Pages

# Build the Vite game and publish dist/ to GitHub Pages on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege tokens the Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; newer pushes supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # devDeps include Vite (needed to build) and Playwright (only the dev
      # smoke test). Skip Playwright's browser download so `npm ci` stays fast.
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      # Capture endpoint (the Worker's /collect URL). Set as a repo Variable:
      # Settings → Secrets and variables → Actions → Variables. Empty = no capture.
      VITE_COLLECT_ENDPOINT: ${{ vars.VITE_COLLECT_ENDPOINT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
